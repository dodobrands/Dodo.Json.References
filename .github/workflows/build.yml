name: build

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    environment: nuget-org
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: dotnet test
        run: dotnet test tests/Dodo.Json.References.Tests -c Release

      - name: Get the version
        id: get_version
        # A published nuget.org version is permanent: reject a malformed tag before packing, not after pushing.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "::error::'$GITHUB_REF_NAME' is not a version tag (v1.2.3 or v1.2.3-rc1)"
            exit 1
          }
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: dotnet pack
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: dotnet pack src/Dodo.Json.References/Dodo.Json.References.csproj -c Release /p:Version="$VERSION" --output nupkgs

      - name: NuGet trusted-publisher login
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: dotnet nuget push
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
