name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build-and-test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Nuget cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nugetcache-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nugetcache-

      - name: Restore
        run: dotnet restore Dodo.Json.References.slnx

      - name: Build
        run: dotnet build Dodo.Json.References.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Dodo.Json.References.Tests -c Release --no-build
