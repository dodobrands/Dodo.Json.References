name: tests

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

# A push run tests the branch head, a pull_request run tests it merged into main; never cancel main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: build-and-test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Restore Nuget cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5.0.0
        with:
          path: ~/.nuget/packages
          key: nugetcache-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nugetcache-

      - name: Restore
        run: dotnet restore Dodo.Json.References.slnx

      - name: Build
        run: dotnet build Dodo.Json.References.slnx -c Release --no-restore

      - name: Test
        # detailed verbosity lists every test (and TestCase) name in the log, so a silently skipped case is visible.
        run: dotnet test tests/Dodo.Json.References.Tests -c Release --no-build --logger "console;verbosity=detailed"

  pack-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Restore Nuget cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5.0.0
        with:
          path: ~/.nuget/packages
          key: nugetcache-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nugetcache-

      # Package validation (the API diff against PackageValidationBaselineVersion) only
      # runs during pack; without this job a breaking change would first surface in the
      # tag publish. The version is a never-published placeholder: CP0003 requires the
      # packed assembly version to be >= the baseline's.
      - name: Pack
        run: dotnet pack src/Dodo.Json.References/Dodo.Json.References.csproj -c Release /p:Version=99.99.99-validate --output nupkgs
