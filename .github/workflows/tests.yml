name: tests

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

# A push run tests the branch head, a pull_request run tests it merged into main; never cancel main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: build-and-test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore Nuget cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5.0.0
        with:
          path: ~/.nuget/packages
          key: nugetcache-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nugetcache-

      - name: Restore
        run: dotnet restore Dodo.Json.References.slnx

      - name: Build
        run: dotnet build Dodo.Json.References.slnx -c Release --no-restore

      - name: Test
        # detailed verbosity lists every test (and TestCase) name in the log, so a silently skipped case is visible.
        run: dotnet test tests/Dodo.Json.References.Tests -c Release --no-build --logger "console;verbosity=detailed"
